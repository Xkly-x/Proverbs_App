{% extends 'ProverbsApp/base.html' %}
{% load static %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center mb-4">
        <div class="col-md-10 col-lg-8">
            <form id="searchForm" action="{% url 'index' %}" method="get" class="input-group shadow-sm search-box">
                <input type="hidden" name="tab" value="{{ active_tab|default:'main' }}">

                <select id="categorySelect" name="category" class="form-select border-0">
                    <option value="">Все темы</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if selected_category == cat.id|stringformat:"i" %}selected{% endif %}>
                            {{ cat.name }}
                        </option>
                    {% endfor %}
                </select>

                <input type="text" id="liveSearchInput" name="q" class="form-control border-0"
                       placeholder="Поиск пословиц..."
                       value="{{ query|default:'' }}">

                <button class="btn btn-primary px-4" type="submit">🔍</button>
            </form>
        </div>
    </div>

    <!-- ВКЛАДКИ -->
    <div class="d-flex flex-wrap gap-2 mb-4 justify-content-center">
        <a href="{% url 'index' %}?tab=main" class="btn {% if active_tab == 'main' %}btn-primary{% else %}btn-outline-primary{% endif %}">Основные</a>
        <a href="{% url 'index' %}?tab=users" class="btn {% if active_tab == 'users' %}btn-primary{% else %}btn-outline-primary{% endif %}">От пользователей</a>
        <a href="{% url 'index' %}?tab=liked" class="btn {% if active_tab == 'liked' %}btn-primary{% else %}btn-outline-primary{% endif %}">Мои лайки</a>
        <a href="{% url 'index' %}?tab=day" class="btn {% if active_tab == 'day' %}btn-primary{% else %}btn-outline-primary{% endif %}">Пословица дня</a>
        <a href="{% url 'index' %}?tab=popular" class="btn {% if active_tab == 'popular' %}btn-primary{% else %}btn-outline-primary{% endif %}">Популярные</a>
    </div>

    {% if user.is_authenticated %}
    <div class="text-center mb-4">
        <a href="{% url 'submit_proverb' %}" class="btn btn-success">➕ Предложить пословицу</a>
    </div>
    {% endif %}

    <div class="row" id="proverbsContainer">
        {% include 'ProverbsApp/partials/proverbs_list.html' %}
    </div>
</div>
{% endblock %}
